name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check architecture guardrails
        run: python3 scripts/check_architecture.py
      - name: Test architecture guardrails
        run: python3 scripts/check_architecture.py --self-test
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workspace with default features
        run: cargo check --workspace --all-targets --locked
      - name: Check SDK without default features
        run: cargo check -p rho-sdk --all-targets --no-default-features --locked
      - name: Check SDK with all features
        run: cargo check -p rho-sdk --all-targets --all-features --locked
      - name: Check application without default features
        run: cargo check -p rho-coding-agent --all-targets --no-default-features --locked
      - name: Run tests
        run: cargo test --workspace
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check SDK package
        run: cargo publish --dry-run --locked -p rho-sdk
      - name: Check application package contents
        run: cargo package --locked --no-verify -p rho-coding-agent

  platform-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
      - name: Check platform build
        run: cargo check --workspace --all-targets --locked
      - name: Run Bash behavior tests
        if: runner.os == 'macOS'
        run: cargo test --locked tools::bash::tests
