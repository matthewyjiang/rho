name: SDK release evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  redaction:
    name: redaction audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
        with:
          shared-key: sdk-release-evidence
      - name: Run redaction audit
        run: RHO_AUDIT_OUTPUT="$RUNNER_TEMP/sdk-redaction.json" ./scripts/run_sdk_redaction_audit.sh
      - name: Upload redaction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-redaction-${{ github.sha }}
          path: ${{ runner.temp }}/sdk-redaction.json
          if-no-files-found: error
          retention-days: 30

  benchmarks:
    name: release benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
        with:
          shared-key: sdk-release-evidence
      - name: Run release benchmarks
        run: RHO_BENCH_OUTPUT="$RUNNER_TEMP/sdk-release-benchmarks.json" ./scripts/run_sdk_release_benchmarks.sh
      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-release-benchmarks-${{ github.sha }}
          path: ${{ runner.temp }}/sdk-release-benchmarks.json
          if-no-files-found: error
          retention-days: 30
