name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      candidate-sha:
        description: Existing tagged release commit to resume after a workflow failure
        required: false
        type: string
      app-tag:
        description: Existing rho-coding-agent tag to resume
        required: false
        type: string
      sdk-tag:
        description: Existing rho-sdk tag to resume
        required: false
        type: string
      tools-tag:
        description: Existing rho-tools tag to resume
        required: false
        type: string
      providers-tag:
        description: Existing rho-providers tag to resume
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created || steps.recovery.outputs.releases_created }}
      release_created: ${{ steps.release.outputs['crates/rho--release_created'] || steps.recovery.outputs.release_created }}
      sdk_release_created: ${{ steps.release.outputs['crates/rho-sdk--release_created'] || steps.recovery.outputs.sdk_release_created }}
      tools_release_created: ${{ steps.release.outputs['crates/rho-tools--release_created'] || steps.recovery.outputs.tools_release_created }}
      providers_release_created: ${{ steps.release.outputs['crates/rho-providers--release_created'] || steps.recovery.outputs.providers_release_created }}
      candidate_sha: ${{ steps.release.outputs['crates/rho--sha'] || steps.release.outputs['crates/rho-sdk--sha'] || steps.release.outputs['crates/rho-tools--sha'] || steps.release.outputs['crates/rho-providers--sha'] || steps.recovery.outputs.candidate_sha }}
      tag_name: ${{ steps.release.outputs['crates/rho--tag_name'] || steps.recovery.outputs.tag_name }}
      sdk_tag_name: ${{ steps.release.outputs['crates/rho-sdk--tag_name'] || steps.recovery.outputs.sdk_tag_name }}
      tools_tag_name: ${{ steps.release.outputs['crates/rho-tools--tag_name'] || steps.recovery.outputs.tools_tag_name }}
      providers_tag_name: ${{ steps.release.outputs['crates/rho-providers--tag_name'] || steps.recovery.outputs.providers_tag_name }}
    steps:
      - id: release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.candidate-sha == '' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
      - name: Check out recovery candidate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate-sha != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate-sha }}
      - name: Verify existing release tags for recovery
        id: recovery
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate-sha != '' }}
        env:
          APP_TAG: ${{ inputs.app-tag }}
          CANDIDATE_SHA: ${{ inputs.candidate-sha }}
          GH_TOKEN: ${{ github.token }}
          PROVIDERS_TAG: ${{ inputs.providers-tag }}
          SDK_TAG: ${{ inputs.sdk-tag }}
          TOOLS_TAG: ${{ inputs.tools-tag }}
        run: |
          set -euo pipefail
          if [[ ! "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Candidate SHA must be a full lowercase commit SHA" >&2
            exit 1
          fi
          if [[ -z "$APP_TAG" && -z "$SDK_TAG" && -z "$TOOLS_TAG" && -z "$PROVIDERS_TAG" ]]; then
            echo "At least one existing release tag is required" >&2
            exit 1
          fi
          verify_tag() {
            local tag="$1"
            local expected_tag="$2"
            if [[ "$tag" != "$expected_tag" ]]; then
              echo "Recovery tag $tag does not match candidate version $expected_tag" >&2
              exit 1
            fi
            local tagged_sha
            tagged_sha="$(git ls-remote origin "refs/tags/$tag" | cut -f1)"
            if [[ "$tagged_sha" != "$CANDIDATE_SHA" ]]; then
              echo "Tag $tag resolves to $tagged_sha instead of $CANDIDATE_SHA" >&2
              exit 1
            fi
            if [[ "$(gh release view "$tag" --json isDraft --jq .isDraft)" != "true" ]]; then
              echo "Release $tag is not an unpublished draft" >&2
              exit 1
            fi
          }
          app_version="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/rho/Cargo.toml", "rb"))["package"]["version"])')"
          sdk_version="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/rho-sdk/Cargo.toml", "rb"))["package"]["version"])')"
          tools_version="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/rho-tools/Cargo.toml", "rb"))["package"]["version"])')"
          providers_version="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/rho-providers/Cargo.toml", "rb"))["package"]["version"])')"
          if [[ -n "$APP_TAG" ]]; then
            verify_tag "$APP_TAG" "rho-coding-agent-v$app_version"
          fi
          if [[ -n "$SDK_TAG" ]]; then
            verify_tag "$SDK_TAG" "rho-sdk-v$sdk_version"
          fi
          if [[ -n "$TOOLS_TAG" ]]; then
            verify_tag "$TOOLS_TAG" "rho-tools-v$tools_version"
          fi
          if [[ -n "$PROVIDERS_TAG" ]]; then
            verify_tag "$PROVIDERS_TAG" "rho-providers-v$providers_version"
          fi
          echo "releases_created=true" >> "$GITHUB_OUTPUT"
          echo "release_created=$([[ -n "$APP_TAG" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "sdk_release_created=$([[ -n "$SDK_TAG" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "tools_release_created=$([[ -n "$TOOLS_TAG" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "providers_release_created=$([[ -n "$PROVIDERS_TAG" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$CANDIDATE_SHA" >> "$GITHUB_OUTPUT"
          echo "tag_name=$APP_TAG" >> "$GITHUB_OUTPUT"
          echo "sdk_tag_name=$SDK_TAG" >> "$GITHUB_OUTPUT"
          echo "tools_tag_name=$TOOLS_TAG" >> "$GITHUB_OUTPUT"
          echo "providers_tag_name=$PROVIDERS_TAG" >> "$GITHUB_OUTPUT"
      # The downstream fixture is a deliberately separate workspace, so the
      # cargo-workspace plugin cannot update its lockfile when rho-sdk changes.
      - name: Check out release pull request
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
      - name: Install Rust for downstream lockfile
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Synchronize downstream SDK lockfile
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          set -euo pipefail
          release_branch="$(git branch --show-current)"
          cargo update --manifest-path fixtures/downstream/Cargo.toml --package rho-sdk
          if git diff --quiet -- fixtures/downstream/Cargo.lock; then
            exit 0
          fi
          if [[ "$(git diff --name-only)" != "fixtures/downstream/Cargo.lock" ]]; then
            echo "cargo update unexpectedly changed files outside the downstream lockfile" >&2
            git diff --name-only >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/downstream/Cargo.lock
          git commit -m "chore(release): sync downstream SDK lockfile"
          git push origin "HEAD:$release_branch"

  sdk-release-evidence:
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    uses: ./.github/workflows/sdk-release-evidence.yml
    with:
      candidate-sha: ${{ needs.release.outputs.candidate_sha }}

  # crates.io versions cannot be overwritten. Keep GitHub releases as drafts
  # until the exact validated SHA has published every selected crate. Public
  # release publication happens only after crates succeed.
  publish-crates:
    needs: [release, sdk-release-evidence]
    if: ${{ needs.release.outputs.releases_created == 'true' && needs.sdk-release-evidence.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sdk-release-evidence.outputs.candidate-sha }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
      - name: Publish workspace crates for exact candidate SHA
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CANDIDATE_SHA: ${{ needs.sdk-release-evidence.outputs.candidate-sha }}
          PUBLISH_SDK: ${{ needs.release.outputs.sdk_release_created }}
          PUBLISH_TOOLS: ${{ needs.release.outputs.tools_release_created }}
          PUBLISH_PROVIDERS: ${{ needs.release.outputs.providers_release_created }}
          PUBLISH_APP: ${{ needs.release.outputs.release_created }}
        run: |
          set -euo pipefail
          args=(--sha "$CANDIDATE_SHA")
          if [[ "$PUBLISH_SDK" == "true" ]]; then
            args+=(--sdk)
          fi
          if [[ "$PUBLISH_TOOLS" == "true" ]]; then
            args+=(--tools)
          fi
          if [[ "$PUBLISH_PROVIDERS" == "true" ]]; then
            args+=(--providers)
          fi
          if [[ "$PUBLISH_APP" == "true" ]]; then
            args+=(--app)
          fi
          ./scripts/publish_workspace_crates.sh "${args[@]}"
      - name: Publish draft SDK release after crates.io success
        if: ${{ needs.release.outputs.sdk_release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_TAG: ${{ needs.release.outputs.sdk_tag_name }}
        run: gh release edit "$SDK_TAG" --draft=false
      - name: Publish draft rho-tools release after crates.io success
        if: ${{ needs.release.outputs.tools_release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TOOLS_TAG: ${{ needs.release.outputs.tools_tag_name }}
        run: gh release edit "$TOOLS_TAG" --draft=false
      - name: Publish draft rho-providers release after crates.io success
        if: ${{ needs.release.outputs.providers_release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PROVIDERS_TAG: ${{ needs.release.outputs.providers_tag_name }}
        run: gh release edit "$PROVIDERS_TAG" --draft=false

  release-binaries:
    needs: [release, publish-crates]
    if: ${{ needs.release.outputs.release_created == 'true' && needs.publish-crates.result == 'success' }}
    name: release binary ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cache-targets: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cache-targets: true
          - os: macos-14
            target: aarch64-apple-darwin
            cache-targets: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cache-targets: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: swatinem/rust-cache@v2
        with:
          cache-targets: ${{ matrix.cache-targets }}
          shared-key: release-binaries-${{ matrix.target }}
      - name: Build binary
        run: cargo build --release --locked --bin rho --target ${{ matrix.target }}
      - name: Sign Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)) {
            Write-Host "WINDOWS_SIGNING_CERT_BASE64 is not set; skipping Authenticode signing."
            exit 0
          }
          $CertPath = Join-Path $env:RUNNER_TEMP "rho-signing-cert.pfx"
          [IO.File]::WriteAllBytes($CertPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $Signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $Signtool) {
            throw "signtool.exe was not found"
          }
          & $Signtool sign /f $CertPath /p $env:WINDOWS_SIGNING_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 target/${{ matrix.target }}/release/rho.exe
          & $Signtool verify /pa target/${{ matrix.target }}/release/rho.exe
      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rho dist/rho
          tar -C dist -czf rho-${{ matrix.target }}.tar.gz rho
          shasum -a 256 rho-${{ matrix.target }}.tar.gz > rho-${{ matrix.target }}.tar.gz.sha256
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/rho.exe dist/rho.exe
          Compress-Archive -Path dist/rho.exe -DestinationPath rho-${{ matrix.target }}.zip -Force
          $Hash = (Get-FileHash -Algorithm SHA256 rho-${{ matrix.target }}.zip).Hash.ToLowerInvariant()
          "$Hash  rho-${{ matrix.target }}.zip" | Out-File -Encoding ascii rho-${{ matrix.target }}.zip.sha256
      - name: Upload Unix release assets
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
        run: gh release upload "$TAG" rho-${{ matrix.target }}.tar.gz rho-${{ matrix.target }}.tar.gz.sha256 --clobber
      - name: Upload Windows release assets
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
        shell: pwsh
        run: gh release upload "$env:TAG" rho-${{ matrix.target }}.zip rho-${{ matrix.target }}.zip.sha256 --clobber

  publish-app-release:
    needs: [release, publish-crates, release-binaries]
    if: ${{ needs.release.outputs.release_created == 'true' && needs.publish-crates.result == 'success' && needs.release-binaries.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish app release after all platform assets upload
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false
      - name: Dispatch Arch package workflow
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
        run: gh workflow run publish-arch-package.yml --ref "$TAG"


  update-scoop-manifest:
    needs: [release, publish-app-release]
    if: ${{ needs.release.outputs.release_created == 'true' && needs.publish-app-release.result == 'success' }}
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main for Scoop manifest update
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Download Windows checksum
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag_name }}
        shell: pwsh
        run: gh release download "$env:TAG" --pattern "rho-$env:TARGET.zip.sha256"
      - name: Update Scoop manifest
        id: scoop-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $Tag = "${{ needs.release.outputs.tag_name }}"
          $Version = $Tag -replace '^rho-coding-agent-v', ''
          $Asset = "rho-$env:TARGET.zip"
          $Hash = ((Get-Content "$Asset.sha256" -Raw) -split '\s+')[0]
          $Url = "https://github.com/${{ github.repository }}/releases/download/$Tag/$Asset"

          $ManifestPath = "bucket/rho.json"
          $Manifest = Get-Content $ManifestPath -Raw | ConvertFrom-Json
          $Manifest.version = $Version
          $Manifest.architecture.'64bit'.url = $Url
          $Manifest.architecture.'64bit'.hash = $Hash
          $Manifest | ConvertTo-Json -Depth 10 | Set-Content -Path $ManifestPath -Encoding UTF8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $ManifestPath
          if (git diff --cached --quiet) {
            Write-Host "Scoop manifest is already up to date."
            exit 0
          }
          $Branch = "build/update-scoop-manifest-$Tag"
          if (git ls-remote --heads origin $Branch) {
            git fetch origin "${Branch}:refs/remotes/origin/${Branch}"
          }
          git checkout -B $Branch
          git commit -m "build(windows): update scoop manifest for $Tag"
          git push --force-with-lease origin "HEAD:$Branch"

          $Title = "build(windows): update scoop manifest for $Tag"
          $BodyFile = New-TemporaryFile
          Set-Content -Path $BodyFile -Value "Updates the Scoop manifest for $Tag."
          $ExistingPr = gh pr list --head $Branch --base main --json number --jq '.[0].number'
          if ($ExistingPr) {
            gh pr edit $ExistingPr --title $Title --body-file $BodyFile
          } else {
            gh pr create --base main --head $Branch --title $Title --body-file $BodyFile
          }
          $PrNumber = gh pr list --head $Branch --base main --json number --jq '.[0].number'
          if (-not $PrNumber) {
            throw "Could not find the Scoop manifest pull request for $Branch"
          }
          "number=$PrNumber" >> $env:GITHUB_OUTPUT
      - name: Merge Scoop manifest pull request
        if: ${{ steps.scoop-pr.outputs.number != '' }}
        env:
          GH_TOKEN: ${{ secrets.SCOOP_MANIFEST_TOKEN }}
          PR_NUMBER: ${{ steps.scoop-pr.outputs.number }}
        shell: pwsh
        run: gh pr merge $env:PR_NUMBER --squash --admin --delete-branch
