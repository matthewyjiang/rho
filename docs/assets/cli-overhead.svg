  <rect x="168" y="190.5" width="314.0" height="11" rx="3" fill="#161b22"/>
  <rect x="168" y="190.5" width="299.0" height="11" rx="3" fill="#30363d"/>
  <text x="558.0" y="200.0" fill="#c9d1d9" font-family="DejaVu Sans Mono, Liberation Mono, Consolas, monospace" font-size="12" text-anchor="end">546 ms</text>
  <rect x="582.0" y="190.5" width="314.0" height="11" rx="3" fill="#161b22"/>
  <rect x="582.0" y="190.5" width="156.4" height="11" rx="3" fill="#30363d"/>
  <text x="972.0" y="200.0" fill="#c9d1d9" font-family="DejaVu Sans Mono, Liberation Mono, Consolas, monospace" font-size="12" text-anchor="end">149 MiB</text>
  <text x="20" y="226" fill="#6e7681" font-family="DejaVu Sans, Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Native: rho, Codex. JS runtimes: Claude Code, Pi, OpenCode. Pi uses --no-extensions.</text>
</svg>
