<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Rho interactive terminal UI demo</title>
  <desc id="desc">An animated, terminal-accurate Rho session reads and edits Rust code, runs tests, and reports completion.</desc>
  <defs>
    <clipPath id="screen-clip">
      <rect x="24" y="24" width="1152" height="627" rx="12"/>
    </clipPath>
    <filter id="terminal-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; }
      .body { fill: #c9d1d9; }
      .bright { fill: #f0f3f6; }
      .dim { fill: #6e7681; }
      .cyan { fill: #39c5cf; }
      .green { fill: #3fb950; }
      .yellow { fill: #d29922; }
      .bold { font-weight: 700; }
      .italic { font-style: italic; }
      .stage { opacity: 0; }
      .stage-one { animation: stage-one 12s linear infinite; }
      .stage-two { animation: stage-two 12s linear infinite; }
      .stage-three { opacity: 1; animation: stage-three 12s linear infinite; }
      .cursor { animation: cursor 1.05s steps(2, jump-none) infinite; }
      .spin-one { animation: spin-one 800ms steps(1) infinite; }
      .spin-two { animation: spin-two 800ms steps(1) infinite; }
      @keyframes stage-one {
        0%, 3% { opacity: 0; }
        7%, 28% { opacity: 1; }
        33%, 100% { opacity: 0; }
      }
      @keyframes stage-two {
        0%, 30% { opacity: 0; }
        35%, 63% { opacity: 1; }
        68%, 100% { opacity: 0; }
      }
      @keyframes stage-three {
        0%, 65% { opacity: 0; }
        70%, 96% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes cursor { 0%, 48% { opacity: 1; } 52%, 100% { opacity: 0; } }
      @keyframes spin-one { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes spin-two { 0%, 49% { opacity: 0; } 50%, 100% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .stage, .cursor, .spin-one, .spin-two { animation: none; }
        .stage-one, .stage-two { display: none; }
        .stage-three, .cursor, .spin-one { opacity: 1; }
        .spin-two { display: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="675" rx="18" fill="#090c10"/>
  <g filter="url(#terminal-shadow)">
    <rect x="24" y="24" width="1152" height="627" rx="12" fill="#0d1117" stroke="#30363d"/>
  </g>

  <g clip-path="url(#screen-clip)">
    <rect x="24" y="24" width="1152" height="42" fill="#161b22"/>
    <circle cx="48" cy="45" r="5" fill="#6e7681"/>
    <text x="65" y="50" class="mono dim">rho · ~/rho</text>
    <text x="1152" y="50" text-anchor="end" class="mono dim">115×35</text>

    <text x="48" y="89" textLength="1104" lengthAdjust="spacing" class="mono dim">───────────────────────────────────────────────────────────────────────────────────────────────────────────────</text>
    <text x="48" y="113" class="mono bold cyan">rho</text>
    <text x="84" y="113" class="mono body">v</text>
    <text x="94" y="113" class="mono bold green">1.8.2</text>
    <text x="48" y="137" textLength="1104" lengthAdjust="spacing" class="mono dim">───────────────────────────────────────────────────────────────────────────────────────────────────────────────</text>

    <rect x="48" y="157" width="1104" height="66" fill="#222629"/>
    <text x="57" y="197" class="mono bright">Add request IDs to API logs and update the tests.</text>

    <g class="stage stage-one">
      <text x="57" y="253" class="mono dim">I’ll trace the request path and current logging tests before editing.</text>
      <rect x="48" y="276" width="1104" height="66" fill="#222629"/>
      <text x="57" y="316" class="mono bright">read_file crates/api/src/middleware/request_id.rs</text>

      <rect x="48" y="433" width="1104" height="50" fill="#222629"/>
      <text x="57" y="455" class="mono cyan spin-one">⠋</text>
      <text x="57" y="455" class="mono cyan spin-two">⡆</text>
      <text x="76" y="455" class="mono dim">running tool</text>
      <text x="57" y="477" class="mono dim">  └ </text>
      <text x="90" y="477" class="mono bold body">explorer</text>
      <text x="165" y="477" class="mono dim">  bg-a13f · read_file                              2s</text>
    </g>

    <g class="stage stage-two">
      <text x="57" y="253" class="mono body">The middleware already owns a tracing span, so the request ID can stay at</text>
      <text x="57" y="276" class="mono body">that boundary.</text>

      <rect x="48" y="298" width="1104" height="88" fill="#2a2f25"/>
      <text x="57" y="329" class="mono bright">edit_file crates/api/src/middleware/request_id.rs</text>
      <text x="57" y="359" class="mono green">+ span.record("request_id", request_id.as_str());</text>

      <rect x="48" y="408" width="1104" height="66" fill="#222629"/>
      <text x="57" y="447" class="mono bright">bash cargo test -p atlas-api -- request_id</text>
      <text x="1089" y="447" text-anchor="end" class="mono dim">running</text>
    </g>

    <g class="stage stage-three">
      <rect x="48" y="252" width="1104" height="88" fill="#2a2f25"/>
      <text x="57" y="283" class="mono bright">bash cargo test -p atlas-api -- request_id</text>
      <text x="57" y="313" class="mono green">test result: ok. 28 passed; 0 failed</text>

      <text x="57" y="376" class="mono body">Done.</text>
      <text x="57" y="407" class="mono body">• Added stable request IDs at the middleware boundary.</text>
      <text x="57" y="438" class="mono body">• Included the ID in log spans and response headers.</text>
      <text x="57" y="469" class="mono body">• Added coverage for generated and forwarded IDs.</text>
    </g>

    <text x="48" y="512" textLength="1104" lengthAdjust="spacing" class="mono yellow">───────────────────────────────────────────────────────────────────────────────────────────────────────────────</text>
    <rect x="57" y="529" width="8" height="17" fill="#c9d1d9" class="cursor"/>
    <text x="48" y="566" textLength="1104" lengthAdjust="spacing" class="mono yellow">───────────────────────────────────────────────────────────────────────────────────────────────────────────────</text>

    <text x="48" y="592" class="mono dim">~/rho (docs/rho-ui-demo)</text>
    <text x="48" y="618" class="mono dim">$0.08 (sub) ~2.0%/372.0k</text>
    <text x="1152" y="618" text-anchor="end" class="mono dim">◇ Auto • (openai-codex) gpt-5.6-sol • high</text>
  </g>
</svg>
