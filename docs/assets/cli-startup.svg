<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="236" viewBox="0 0 1000 236" role="img" aria-labelledby="title desc">
  <title id="title">CLI startup and memory comparison</title>
  <desc id="desc">Side-by-side bar chart of median help startup time and peak RSS for rho and other agent CLIs on Linux.</desc>
  <defs>
    <style>
      .sans { font-family: "DejaVu Sans", "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: "DejaVu Sans Mono", "Liberation Mono", Consolas, monospace; }
      .title { fill: #f0f3f6; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #8b949e; font-size: 12px; }
      .panel { fill: #8b949e; font-size: 11px; letter-spacing: 0.05em; }
      .label { fill: #c9d1d9; font-size: 12px; }
      .label-hi { fill: #39c5cf; font-size: 12px; font-weight: 700; }
      .value { fill: #c9d1d9; font-size: 12px; }
      .value-hi { fill: #3fb950; font-size: 12px; font-weight: 700; }
      .foot { fill: #6e7681; font-size: 11px; }
      .bar { fill: #30363d; }
      .bar-hi { fill: #39c5cf; }
      .track { fill: #161b22; }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="12" fill="#0d1117"/>
  <text x="20" y="24" class="sans title">CLI process overhead</text>
  <text x="20" y="44" class="sans subtitle">Median of 50 help-startup runs on Linux x86_64. Not TUI cost or model latency.</text>
  <text x="168" y="56" class="sans panel">STARTUP</text>
  <text x="582.0" y="56" class="sans panel">PEAK RSS</text>
  <text x="158" y="88.0" text-anchor="end" class="sans label-hi">rho</text>
  <rect x="168" y="78.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="168" y="78.5" width="3.0" height="11" rx="3" class="bar-hi"/>
  <text x="558.0" y="88.0" text-anchor="end" class="mono value-hi">3.41 ms</text>
  <rect x="582.0" y="78.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="582.0" y="78.5" width="15.0" height="11" rx="3" class="bar-hi"/>
  <text x="972.0" y="88.0" text-anchor="end" class="mono value-hi">14.3 MiB</text>
  <text x="158" y="116.0" text-anchor="end" class="sans label">Codex</text>
  <rect x="168" y="106.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="168" y="106.5" width="4.1" height="11" rx="3" class="bar"/>
  <text x="558.0" y="116.0" text-anchor="end" class="mono value">7.44 ms</text>
  <rect x="582.0" y="106.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="582.0" y="106.5" width="20.6" height="11" rx="3" class="bar"/>
  <text x="972.0" y="116.0" text-anchor="end" class="mono value">19.6 MiB</text>
  <text x="158" y="144.0" text-anchor="end" class="sans label">Claude Code</text>
  <rect x="168" y="134.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="168" y="134.5" width="101.3" height="11" rx="3" class="bar"/>
  <text x="558.0" y="144.0" text-anchor="end" class="mono value">185 ms</text>
  <rect x="582.0" y="134.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="582.0" y="134.5" width="299.0" height="11" rx="3" class="bar"/>
  <text x="972.0" y="144.0" text-anchor="end" class="mono value">285 MiB</text>
  <text x="158" y="172.0" text-anchor="end" class="sans label">OpenCode</text>
  <rect x="168" y="162.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="168" y="162.5" width="225.1" height="11" rx="3" class="bar"/>
  <text x="558.0" y="172.0" text-anchor="end" class="mono value">411 ms</text>
  <rect x="582.0" y="162.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="582.0" y="162.5" width="211.1" height="11" rx="3" class="bar"/>
  <text x="972.0" y="172.0" text-anchor="end" class="mono value">201 MiB</text>
  <text x="158" y="200.0" text-anchor="end" class="sans label">Pi (no extensions)</text>
  <rect x="168" y="190.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="168" y="190.5" width="299.0" height="11" rx="3" class="bar"/>
  <text x="558.0" y="200.0" text-anchor="end" class="mono value">546 ms</text>
  <rect x="582.0" y="190.5" width="314.0" height="11" rx="3" class="track"/>
  <rect x="582.0" y="190.5" width="156.4" height="11" rx="3" class="bar"/>
  <text x="972.0" y="200.0" text-anchor="end" class="mono value">149 MiB</text>
  <text x="20" y="226" class="sans foot">Native: rho, Codex. JS runtimes: Claude Code, Pi, OpenCode. Pi uses --no-extensions.</text>
</svg>
